name: Meteo pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"   # cada día a las 04:15 UTC

jobs:
  run-meteo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install copernicusmarine xarray pandas numpy requests netCDF4

      - name: Run meteo pipeline
        env:
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: |
          python meteo_pipeline.py

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wave_points.json wind_10m_forecast.json meteo_points.json
          git diff --cached --quiet || git commit -m "Update meteo data"
          git push
