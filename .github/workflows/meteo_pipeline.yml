name: Meteo pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"
    - cron: "0 14 * * *"
    
permissions:
  contents: write
  
jobs:
  run-meteo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install copernicusmarine xarray pandas numpy requests netCDF4 h5py h5netcdf

      - name: Run meteo pipeline
        env:
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: |
          python 8_meteo_pipeline_fusionado_5d.py

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wave_points.json wind_10m_forecast.json meteo_points.json
          git diff --cached --quiet || git commit -m "Update meteo data"
          git push
