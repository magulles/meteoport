<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meteoport</title>

  <link rel="stylesheet" href="style.css">

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="topbar">
  <div class="brand">
    <img src="logo-meteoport.png" class="logo">
    <p class="tagline">Wave, wind and coastal conditions</p>
  </div>
</header>

<main class="app-layout">

  <aside class="sidebar">

    <h2>Selected location</h2>

    <div class="time-control">
      <label>
        Time: <span id="hour-label">--</span>
      </label>
      <input type="range" id="hour-slider" min="0" max="119" value="0">
    </div>

    <div id="info-panel" class="info-panel"></div>

  </aside>

  <section class="map-section">
    <div id="map"></div>
  </section>

</main>

<!-- 👇 GRÁFICA ABAJO FULL WIDTH -->
<section class="bottom-chart">
  <canvas id="wave-chart"></canvas>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
